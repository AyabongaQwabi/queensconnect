# Render Blueprint – single web service (FastAPI + React SPA)
# Deploy: connect repo in Render Dashboard and use this Blueprint, or use Render CLI.
# Set env vars in Dashboard (GOOGLE_API_KEY, Firebase, Twilio, etc.); see docs/deploy-render.md.

services:
  - type: web
    runtime: python
    name: queens-connect
    buildCommand: pip install -r backend/requirements.txt && cd frontend && npm ci && npm run build
    startCommand: PYTHONPATH=. gunicorn backend.main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # Add secrets in Render Dashboard: GOOGLE_API_KEY, FIREBASE_*, TWILIO_*, etc.
      # Set LENDING_BASE_URL / BASE_URL to your Render URL (e.g. https://queens-connect.onrender.com) for payment links.
